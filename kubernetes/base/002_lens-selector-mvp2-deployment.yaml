apiVersion: apps/v1
kind: Deployment
metadata:
  name: lens-selector-fhir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lens-selector-fhir
  template:
    metadata:
      labels:
        app: lens-selector-fhir
    spec:
      containers:
      - name: lens-selector-fhir
        image: ghcr.io/gravitate-health/lens-selector-fhir:v0.5.0
        imagePullPolicy: Always
        env:
        - name: ENVIRONMENT
          value: "prod"
        - name: FHIR_URL
          value: "http://fhir-server-epi:8080/api/fhir"
        ports:
        - containerPort: 3000
          protocol: TCP
        resources: {}
      restartPolicy: Always
status: {}
