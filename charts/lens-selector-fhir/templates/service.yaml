apiVersion: v1
kind: Service
metadata:
  name: {{ include "lens-selector-fhir.fullname" . }}
  labels:
    {{- include "lens-selector-fhir.labels" . | nindent 4 }}
    {{- include "lens-selector-fhir.gravitateLabels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: {{ .Values.service.protocol }}
      name: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "lens-selector-fhir.selectorLabels" . | nindent 4 }}
